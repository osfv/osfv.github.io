<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>iqad</title>
  <meta name="description" content="Discord bots, backend experiments, and small tools by Vince." />
  <meta name="theme-color" content="#050505" />
  <!-- open graph for discord and other platforms -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://iqad.me" />
  <meta property="og:title" content="iqad" />
  <meta property="og:description" content="Find out more about me." />
  <meta property="og:image" content="https://iqad.me/assets/iqad.png" />
  <meta property="og:image:alt" content="iqad mark" />
  <!-- X card-->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="iqad" />
  <meta name="twitter:description" content="Find out more about me." />
  <meta name="twitter:image" content="https://iqad.me/assets/iqad.png" />
  <link rel="icon" type="image/png" href="/assets/iqad.png" />
  <link rel="canonical" href="https://iqad.me" />
  <style>
    :root {
      color-scheme: dark;
      --bg: oklch(7% 0 0);
      --text: oklch(94% 0 0);
      --muted: oklch(63% 0 0);
      --link-rest: oklch(48% 0 0);
      --link-hover: oklch(100% 0 0);
      --ease-out: cubic-bezier(.16, 1, .3, 1);
      --ease-soft: cubic-bezier(.22, .61, .36, 1);
      --ease-glide: cubic-bezier(.4, 0, .2, 1);
    }
    * { box-sizing: border-box; }
    html {
      min-height: 100%;
      background: var(--bg);
      scrollbar-width: none;
    }
    html::-webkit-scrollbar,
    body::-webkit-scrollbar { display: none; }
    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      scrollbar-width: none;
      background:
        radial-gradient(circle at 80% 20%, rgba(255, 255, 255, .045), transparent 28%),
        var(--bg);
      color: var(--muted);
      font: 450 16px/1.55 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    ::selection { background: var(--text); color: var(--bg); }
    @view-transition { navigation: auto; }
    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation-duration: 320ms;
      animation-timing-function: var(--ease-out);
    }
    main {
      position: relative;
      width: min(570px, calc(100vw - 32px));
      margin-left: clamp(16px, 7vw, 112px);
      padding-top: clamp(132px, 31vh, 245px);
      padding-bottom: 80px;
      opacity: 0;
      transform: translateY(8px);
      animation: page-in 900ms var(--ease-out) forwards;
    }
    .mark {
    display: block;
    width: 56px;
    height: 56px;
    margin-bottom: 22px;
    opacity: 0;
    transform: translateY(7px) scale(.96);
    animation: mark-in 820ms var(--ease-out) 100ms both;
    cursor: pointer;
    touch-action: manipulation;
    }
    h1 {
      margin: 0 0 22px;
      color: var(--text);
      font-size: 22px;
      line-height: 1.2;
      font-weight: 720;
    }
    h1 .word {
      display: inline-block;
      opacity: 0;
      transform: translateY(.35em);
      animation: word-in 720ms var(--ease-out) both;
      animation-delay: calc(200ms + var(--i, 0) * 70ms);
    }
    p {
      margin: 0 0 17px;
      opacity: 0;
      transform: translateY(7px);
      animation: item-in 760ms var(--ease-out) both;
    }
    p:nth-of-type(1) { animation-delay: 380ms; }
    p:nth-of-type(2) { animation-delay: 460ms; }
    p:nth-of-type(3) { animation-delay: 540ms; }
    p:nth-of-type(4) { animation-delay: 620ms; }
    p:nth-of-type(5) { animation-delay: 720ms; }
    a {
      color: var(--link-rest);
      text-decoration: none;
      font-variation-settings: "wght" 500;
      transition:
        color 480ms var(--ease-glide),
        font-variation-settings 480ms var(--ease-glide);
    }
    a:hover {
      color: var(--link-hover);
      font-variation-settings: "wght" 560;
      transition:
        color 360ms var(--ease-glide),
        font-variation-settings 360ms var(--ease-glide);
    }
    a:focus-visible {
      outline: 2px solid var(--link-hover);
      outline-offset: 4px;
      border-radius: 2px;
    }
    @keyframes page-in { to { opacity: 1; transform: translateY(0); } }
    @keyframes item-in { to { opacity: 1; transform: translateY(0); } }
    @keyframes word-in { to { opacity: 1; transform: translateY(0); } }
    @keyframes mark-in { to { opacity: 1; transform: translateY(0) scale(1); } }
    @media (max-width: 560px) {
      main { padding-top: 118px; }
      body { font-size: 15.5px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
      main, h1, h1 .word, p, .mark {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <canvas class="mark" width="42" height="42" role="img" aria-label="iqad — animated dot face"></canvas>
    <h1>
      <span class="word" style="--i:0">hi,</span>
      <span class="word" style="--i:1">i'm</span>
      <span class="word" style="--i:2">iqad.</span>
    </h1>
    <p>
      i make Discord bots, and QOL tools.
    </p>
    <p>
      most of my code is on <a href="https://github.com/osfv">GitHub</a>.
      my less serious stuff is on <a href="https://iqad.baby">iqad.baby</a>.
    </p>
    <p>
      right now my main focus is on building and maintaining a couple of Discord bots for small servers.
    </p>
    <p>
      you can reach me through <a href="https://github.com/osfv">GitHub</a>, <a href="https://x.com/oxcipity">X</a>, or <a href="mailto:hi@iqad.baby">email</a> me.
    </p>
    <p>
      <a href="/now">currently →</a>
    </p>
  </main>

  <script>
  (() => {
    const canvas = document.querySelector('canvas.mark');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    const GRID = 12;          // dots per side
    const SIZE = 56;          // css px — bump this (+ .mark width/height) for a bigger face
    const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

    // crisp on retina
    const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    canvas.width = SIZE * dpr;
    canvas.height = SIZE * dpr;
    canvas.style.width = SIZE + 'px';
    canvas.style.height = SIZE + 'px';
    ctx.scale(dpr, dpr);

    const cell = SIZE / GRID;
    const radius = cell * 0.36;

    // feature dots [col, row] — face sits cols 3–8, rows 3–9
    const L_OPEN  = [[3,3],[4,3],[3,4],[4,4]];
    const R_OPEN  = [[7,3],[8,3],[7,4],[8,4]];
    const L_SHUT  = [[3,4],[4,4]];
    const R_SHUT  = [[7,4],[8,4]];
    const M_FLAT  = [[4,8],[5,8],[6,8],[7,8]];
    const M_SMILE = [[3,7],[4,8],[5,9],[6,9],[7,8],[8,7]];

    const faces = {
      neutral: [...L_OPEN, ...R_OPEN, ...M_FLAT],
      smile:   [...L_OPEN, ...R_OPEN, ...M_SMILE],
      wink:    [...L_OPEN, ...R_SHUT, ...M_SMILE],
      blink:   [...L_SHUT, ...R_SHUT, ...M_FLAT],
    };

    const target = new Float32Array(GRID * GRID);
    const cur = new Float32Array(GRID * GRID);
    const at = (c, r) => r * GRID + c;

    function setFace(name) {
      target.fill(0);
      for (const [c, r] of faces[name]) target[at(c, r)] = 1;
    }

    function draw() {
      ctx.clearRect(0, 0, SIZE, SIZE);
      const bob = reduce ? 0 : Math.sin(performance.now() / 1000 * 1.4) * 0.4;
      for (let r = 0; r < GRID; r++) {
        for (let c = 0; c < GRID; c++) {
          const v = cur[at(c, r)];
          if (v < 0.012) continue;            // only lit (white) dots show
          const rad = radius * (0.5 + 0.5 * v); // scale-in for smoothness
          ctx.beginPath();
          ctx.fillStyle = 'rgba(255,255,255,' + v + ')';
          ctx.arc(c * cell + cell / 2, r * cell + cell / 2 + bob, rad, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    setFace('neutral');

    if (reduce) {
      cur.set(target);
      draw();
      return;
    }

    function tick() {
      for (let i = 0; i < cur.length; i++) {
        cur[i] += (target[i] - cur[i]) * 0.2; // smooth morph
      }
      draw();
      requestAnimationFrame(tick);
    }
    tick();

    // idle expression scheduler
    let hovering = false;
    function schedule() {
      if (!hovering) {
        const roll = Math.random();
        if (roll < 0.5) {            // blink
          setFace('blink');
          setTimeout(() => { if (!hovering) setFace('neutral'); }, 120);
        } else if (roll < 0.74) {    // quick smile
          setFace('smile');
          setTimeout(() => { if (!hovering) setFace('neutral'); }, 900);
        } else if (roll < 0.88) {    // wink
          setFace('wink');
          setTimeout(() => { if (!hovering) setFace('neutral'); }, 520);
        }
      }
      setTimeout(schedule, 1500 + Math.random() * 2800);
    }
    setTimeout(schedule, 1600);

    // interactions
    canvas.addEventListener('pointerenter', () => { hovering = true; setFace('smile'); });
    canvas.addEventListener('pointerleave', () => { hovering = false; setFace('neutral'); });
    canvas.addEventListener('pointerdown', () => {
      setFace('wink');
      setTimeout(() => setFace(hovering ? 'smile' : 'neutral'), 480);
    });
  })();
</script>
</body>
</html>
