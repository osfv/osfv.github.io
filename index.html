<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>iqad</title>
  <meta name="description" content="Discord bots, backend experiments, and small tools by Vince." />
  <meta name="theme-color" content="#050505" />
  <!-- open graph for discord and other platforms -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://iqad.me" />
  <meta property="og:title" content="iqad" />
  <meta property="og:description" content="Find out more about me." />
  <meta property="og:image" content="https://iqad.me/assets/iqad.png" />
  <meta property="og:image:alt" content="iqad mark" />
  <!-- X card-->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="iqad" />
  <meta name="twitter:description" content="Find out more about me." />
  <meta name="twitter:image" content="https://iqad.me/assets/iqad.png" />
  <link rel="icon" type="image/png" href="/assets/iqad.png" />
  <link rel="canonical" href="https://iqad.me" />
  <style>
    :root {
      color-scheme: dark;
      --bg: oklch(7% 0 0);
      --text: oklch(94% 0 0);
      --muted: oklch(63% 0 0);
      --link-rest: oklch(48% 0 0);
      --link-hover: oklch(100% 0 0);
      --ease-out: cubic-bezier(.16, 1, .3, 1);
      --ease-soft: cubic-bezier(.22, .61, .36, 1);
      --ease-glide: cubic-bezier(.4, 0, .2, 1);
    }
    * { box-sizing: border-box; }
    html {
      min-height: 100%;
      background: var(--bg);
      scrollbar-width: none;
    }
    html::-webkit-scrollbar,
    body::-webkit-scrollbar { display: none; }
    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      scrollbar-width: none;
      background:
        radial-gradient(circle at 80% 20%, rgba(255, 255, 255, .045), transparent 28%),
        var(--bg);
      color: var(--muted);
      font: 450 16px/1.55 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    ::selection { background: var(--text); color: var(--bg); }
    @view-transition { navigation: auto; }
    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation-duration: 320ms;
      animation-timing-function: var(--ease-out);
    }
    main {
      position: relative;
      width: min(570px, calc(100vw - 32px));
      margin-left: clamp(16px, 7vw, 112px);
      padding-top: clamp(132px, 31vh, 245px);
      padding-bottom: 80px;
      opacity: 0;
      transform: translateY(8px);
      animation: page-in 900ms var(--ease-out) forwards;
    }

    .mark {
      display: block;
      width: 42px;
      height: 42px;
      margin-bottom: 20px;
      opacity: 0;
      transform: translateY(7px) scale(.96);
      animation: mark-in 820ms var(--ease-out) 100ms both;
      image-rendering: -webkit-optimize-contrast;
    }

    h1 {
      margin: 0 0 22px;
      color: var(--text);
      font-size: 22px;
      line-height: 1.2;
      font-weight: 720;
    }
    h1 .word {
      display: inline-block;
      opacity: 0;
      transform: translateY(.35em);
      animation: word-in 720ms var(--ease-out) both;
      animation-delay: calc(200ms + var(--i, 0) * 70ms);
    }
    p {
      margin: 0 0 17px;
      opacity: 0;
      transform: translateY(7px);
      animation: item-in 760ms var(--ease-out) both;
    }
    p:nth-of-type(1) { animation-delay: 380ms; }
    p:nth-of-type(2) { animation-delay: 460ms; }
    p:nth-of-type(3) { animation-delay: 540ms; }
    p:nth-of-type(4) { animation-delay: 620ms; }
    p:nth-of-type(5) { animation-delay: 720ms; }
    a {
      color: var(--link-rest);
      text-decoration: none;
      font-variation-settings: "wght" 500;
      transition:
        color 480ms var(--ease-glide),
        font-variation-settings 480ms var(--ease-glide);
    }
    a:hover {
      color: var(--link-hover);
      font-variation-settings: "wght" 560;
      transition:
        color 360ms var(--ease-glide),
        font-variation-settings 360ms var(--ease-glide);
    }
    a:focus-visible {
      outline: 2px solid var(--link-hover);
      outline-offset: 4px;
      border-radius: 2px;
    }
    @keyframes page-in { to { opacity: 1; transform: translateY(0); } }
    @keyframes item-in { to { opacity: 1; transform: translateY(0); } }
    @keyframes word-in { to { opacity: 1; transform: translateY(0); } }
    @keyframes mark-in { to { opacity: 1; transform: translateY(0) scale(1); } }
    @media (max-width: 560px) {
      main { padding-top: 118px; }
      body { font-size: 15.5px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
      main, h1, h1 .word, p, .mark {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <img class="mark" src="assets/iqad.png" alt="iqad mark" width="42" height="42" />

    <h1>
      <span class="word" style="--i:0">hi,</span>
      <span class="word" style="--i:1">i'm</span>
      <span class="word" style="--i:2">iqad.</span>
    </h1>

    <p>
      i make Discord bots, and QOL tools.
    </p>
    <p>
      most of my code is on <a href="https://github.com/osfv">GitHub</a>.
      my less serious stuff is on <a href="https://iqad.baby">iqad.baby</a>.
    </p>
    <p>
      right now my main focus is on building and maintaining a couple of Discord bots for small servers.
    </p>
    <p>
      you can reach me through <a href="https://github.com/osfv">GitHub</a>, <a href="https://x.com/oxcipity">X</a>, or <a href="mailto:hi@iqad.baby">email</a> me.
    </p>
    <p>
      <a href="/now">currently →</a>
    </p>
  </main>
</body>
</html>
